plugins {
    id "java-library"
    id "eclipse"
    id "idea"
    id "maven-publish"
    id "net.neoforged.moddev" version "2.0.107"
}

version = "1.0.0"
group = "com.example.examplemod"

base {
    archivesName = "examplemod"
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    mavenCentral()
    maven { url = "https://maven.createmod.net" } // Create, Ponder, Flywheel
}

neoForge {
    version = "21.1.235"

    parchment {
        minecraftVersion = "1.21.1"
        mappingsVersion = "2024.11.17"
    }

    runs {
        client {
            client()
        }
        server {
            server()
        }
        data {
            data()
        }
    }

    mods {
        examplemod {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    implementation("com.simibubi.create:create-1.21.1:6.0.10-280:slim") { transitive = false }
    compileOnly files("libs/createbigcannons-5.11.6+mc.1.21.1.jar")

    implementation "io.github.llamalad7:mixinextras-neoforge:0.4.1"
    annotationProcessor "org.spongepowered:mixin:0.8.5:processor"
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir "src/generated/resources" }

publishing {
    publications {
        register("mavenJava", MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
